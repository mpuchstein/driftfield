<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Driftfield, in miniature: a current swept into a vortex around one
       bright point of attention, in the aurora palette. -->
  <defs>
    <linearGradient id="aurora" x1="3" y1="5" x2="28" y2="27" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#0c3f3a"/>
      <stop offset="0.42" stop-color="#1aa07a"/>
      <stop offset="0.72" stop-color="#f2cc6b"/>
      <stop offset="1"    stop-color="#ff8d9e"/>
    </linearGradient>
    <radialGradient id="halo" cx="16" cy="16" r="13" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#1aa07a" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#0e5147" stop-opacity="0.22"/>
      <stop offset="1"   stop-color="#07080d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#ffffff"/>
      <stop offset="0.4" stop-color="#bdf6ec"/>
      <stop offset="1"   stop-color="#1aa07a" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.45"/>
    </filter>
  </defs>

  <!-- the void -->
  <rect width="32" height="32" rx="7" fill="#07080d"/>
  <circle cx="16" cy="16" r="13" fill="url(#halo)"/>

  <!-- the current, spiralling inward -->
  <g fill="none" stroke="url(#aurora)" stroke-linecap="round" filter="url(#soft)">
    <path d="M16 3.6 C24 3.6 28.4 9.6 27.3 16 C26.1 23 19.8 27.2 13.6 26
             C7.7 24.8 4.6 19.6 6.6 14.6 C8.2 10.6 12 9 15 10.8
             C17.7 12.4 18 15.2 16 16.6" stroke-width="2.1" opacity="0.95"/>
    <!-- a fainter counter-current for depth -->
    <path d="M6.2 9.4 C11 5.4 18.6 5.8 22.4 10.4" stroke-width="1.1" opacity="0.4"/>
  </g>

  <!-- particles caught in the drift -->
  <circle cx="24.8" cy="13.2" r="0.85" fill="#f2cc6b"/>
  <circle cx="9.4" cy="21.4" r="0.7" fill="#ff8d9e"/>
  <circle cx="20.4" cy="24.6" r="0.6" fill="#bdf6ec" opacity="0.85"/>

  <!-- the point of attention -->
  <circle cx="16" cy="16.4" r="4.4" fill="url(#core)"/>
  <circle cx="16" cy="16.4" r="1.5" fill="#ffffff"/>
</svg>
